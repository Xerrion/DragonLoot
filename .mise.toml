[tools]
just = "latest"
lua = "5.1"
stylua = "latest"

[env]
_.path = ["{{config_root}}/.luarocks/bin", "{{env.HOME}}/.local/share/mise/installs/lua/5.1/luarocks/bin"]

[tasks.test]
run = "busted --verbose"
description = "Run busted test suite"

[tasks.lint]
run = "luacheck ."
description = "Run luacheck linter"
